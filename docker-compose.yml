services:
  frontend:
    container_name: school_frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      API_URL: ${API_URL:-http://api:8080/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  api:
    container_name: school_api
    build:
      context: .
      dockerfile: src/SchoolManagement.API/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-school_management};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-false}
      Database__SeedDemoData: ${DATABASE_SEED_DEMO_DATA:-false}
      Database__AllowProductionAutoMigrate: ${DATABASE_ALLOW_PRODUCTION_AUTO_MIGRATE:-false}
      Database__InitializationLockRetryDelaySeconds: ${DATABASE_INIT_LOCK_RETRY_DELAY_SECONDS:-2}
      Database__InitializationLockTimeoutSeconds: ${DATABASE_INIT_LOCK_TIMEOUT_SECONDS:-60}
      AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
      AllowedOrigins__1: ${FRONTEND_ORIGIN_ALT:-http://localhost:3001}
      AllowedOrigins__2: ${FRONTEND_ORIGIN_IP:-http://127.0.0.1:3000}
      AllowedOrigins__3: ${FRONTEND_ORIGIN_IP_ALT:-http://127.0.0.1:3001}
      Jwt__Issuer: ${JWT_ISSUER:-SchoolManagement}
      Jwt__Audience: ${JWT_AUDIENCE:-SchoolManagement.Client}
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set to a strong 32+ character value}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-60}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      PasswordReset__TokenExpiryMinutes: ${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:-30}
      PasswordReset__FrontendResetUrl: ${PASSWORD_RESET_FRONTEND_URL:-http://localhost:3000/reset-password}
    healthcheck:
      test: ["CMD-SHELL", "curl -f --silent --max-time 3 http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      - api_data_protection:/home/app/.aspnet/DataProtection-Keys
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: school_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-school_management}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  api_data_protection:
